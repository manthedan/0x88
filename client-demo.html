<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tiny Leela Client Demo</title>
<link rel="stylesheet" href="/chessground.base.css" />
<link rel="stylesheet" href="/chessground.brown.css" />
<link rel="stylesheet" href="/chessground.cburnett.css" />
<style>
:root{color-scheme:dark;--bg:#07111f;--panel:#0f172acc;--line:#334155;--text:#f8fafc;--muted:#94a3b8;--accent:#38bdf8;--good:#34d399}*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui;background:radial-gradient(circle at top left,#2563eb55,transparent 32rem),var(--bg);color:var(--text)}main{max-width:1180px;margin:0 auto;padding:24px}.layout{display:grid;grid-template-columns:minmax(320px,620px) minmax(280px,1fr);gap:22px}.board-shell{width:min(620px,calc(100vw - 48px))}#ground{width:100%;aspect-ratio:1/1;border-radius:18px;overflow:hidden;box-shadow:0 24px 70px #0009;background:#312e2b}.cg-wrap{width:100%;height:100%}.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}button,input{border-radius:12px;border:1px solid var(--line);background:#111827;color:var(--text);padding:10px 12px;font:inherit}button{cursor:pointer}button:hover{border-color:var(--accent)}input{width:100%}.sub,.fen,.muted,li{color:var(--muted)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.message{color:var(--good);min-height:1.4em}.bar{display:grid;grid-template-columns:44px 1fr 54px;gap:8px;align-items:center;color:var(--muted)}.track{height:10px;background:#020617;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa)}ol{max-height:260px;overflow:auto}@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body><main><h1>Tiny Leela client-only demo</h1><p class="sub">ONNX Runtime Web + TS PUCT + Chessground all running in your browser. No engine server calls.</p><div class="layout"><div class="board-shell"><div id="ground"></div></div><section class="panel"><div class="row"><button id="engine">Engine move</button><button id="reset">Reset</button><button id="flip">Flip</button><span id="status" class="muted"></span></div><div id="message" class="message">Loading ONNX model…</div><p><b>Runtime</b> <span class="mono">client/onxxruntime-web</span></p><p><b>FEN</b></p><p id="fen" class="fen mono"></p><div class="row"><input id="fenInput" placeholder="Paste FEN..."/><button id="loadFen">Load FEN</button></div><p><b>Value / WDL</b></p><div id="wdl"></div><p><b>Top legal policy moves</b></p><ol id="moves"></ol></section></div></main><script type="module" src="/src/webClient.ts"></script></body></html>
