<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LC0 analysis board</title>
<link rel="stylesheet" href="/chessground.base.css" />
<link rel="stylesheet" href="/chessground.brown.css" />
<link rel="stylesheet" href="/chessground.cburnett.css" />
<style>
:root{--bg:#f3eee4;--panel:#fbf8f0;--ink:#1f1c17;--muted:#6e665c;--rule:#d8cfbe;--accent:#5a6e2a;--soft:#e8efd3;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}
header{padding:12px 20px;border-bottom:1px solid var(--rule);background:var(--panel);display:flex;align-items:baseline;gap:16px}
header h1{margin:0;font-size:19px}header nav a{color:var(--muted);text-decoration:none;font-size:13px;margin-right:12px}header nav a.active{color:var(--accent);font-weight:700}
main{display:grid;grid-template-columns:minmax(320px,540px) minmax(340px,1fr);gap:20px;align-items:start;padding:18px}
.panel{background:var(--panel);border:1px solid var(--rule);border-radius:8px;padding:12px}
.board-wrap{display:flex;gap:8px}
.evalbar{width:18px;border:1px solid var(--rule);border-radius:4px;overflow:hidden;background:#3a3a3a;position:relative;flex:0 0 auto}
.evalbar .white{position:absolute;left:0;right:0;bottom:0;background:#f4f1e8;transition:height .25s}
.evalbar .mid{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--accent);opacity:.6}
.board-shell{flex:1 1 auto;aspect-ratio:1}#ground{width:100%;height:100%;border-radius:6px;overflow:hidden;box-shadow:0 14px 38px -26px #000}
.cg-wrap{width:100%!important;height:100%!important}
.nav{display:flex;gap:6px;margin-top:10px}
button{border:1px solid var(--rule);border-radius:6px;background:white;color:var(--ink);padding:8px 10px;font:inherit;font-size:13px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700}button:disabled{opacity:.55;cursor:not-allowed}
.nav button{flex:1 1 auto}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-top:10px}
.field{display:grid;gap:3px}.field label{font-size:11px;color:var(--muted)}
input,select{font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--rule);border-radius:6px;background:white;color:var(--ink)}
input[type=number]{width:80px;font-family:var(--mono)}
textarea{width:100%;min-height:64px;font-family:var(--mono);font-size:12px;border:1px solid var(--rule);border-radius:6px;padding:8px;resize:vertical}
.lines{list-style:none;margin:8px 0 0;padding:0}
.lines li{display:grid;grid-template-columns:62px 1fr;gap:8px;align-items:baseline;padding:6px 6px;border-top:1px solid var(--rule);cursor:pointer;font-size:13px}
.lines li:hover{background:var(--soft)}
.lines .score{font-family:var(--mono);font-weight:700}
.lines .score.neg{color:#a5461b}.lines .score.pos{color:var(--accent)}
.lines .pv{font-family:var(--mono);overflow-wrap:anywhere}.lines .eng{font-size:10px;color:var(--muted)}
.lines li{padding-left:9px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:12px;color:var(--muted)}
.legend .key{display:inline-flex;align-items:center;gap:5px}
.legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.movelist{font-family:var(--mono);font-size:13px;line-height:1.7;margin-top:8px;max-height:240px;overflow:auto}
.movelist .mv{cursor:pointer;padding:0 3px;border-radius:4px}.movelist .mv:hover{background:var(--soft)}
.movelist .mv.current{background:var(--accent);color:white}
.movelist .var{color:var(--muted)}
.status-grid{display:grid;grid-template-columns:90px 1fr;gap:4px 10px;font-size:12px;margin-top:8px}
.status-grid dt{color:var(--muted)}.status-grid dd{margin:0;font-family:var(--mono);overflow-wrap:anywhere}
h2{font-size:13px;margin:14px 0 0;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
#message{margin-top:10px;padding:8px;border:1px solid var(--rule);border-radius:6px;background:var(--soft);font-family:var(--mono);font-size:12px}
.small{font-size:12px;color:var(--muted)}
table.opening{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
table.opening th,table.opening td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--rule)}
table.opening th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
table.opening td.num,table.opening th.num{text-align:right;font-family:var(--mono)}
table.opening tr.mv{cursor:pointer}table.opening tr.mv:hover td{background:var(--soft)}
table.opening .san{font-family:var(--mono);font-weight:700}
.wdlbar{display:flex;height:14px;border-radius:3px;overflow:hidden;min-width:120px;border:1px solid var(--rule)}
.wdlbar .w{background:#f4f1e8}.wdlbar .d{background:#b9b3a4}.wdlbar .b{background:#3a3a3a}
@media(max-width:900px){main{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>LC0 analysis board</h1>
  <nav><a href="/lc0-policy-only.html">Single engine</a><a href="/lc0-arena.html">Arena</a><a class="active" href="/lc0-analysis.html">Analysis</a></nav>
</header>
<main>
  <section class="panel" aria-label="Board">
    <div class="board-wrap">
      <div class="evalbar" title="Evaluation (white advantage)"><div class="mid"></div><div class="white" id="evalWhite" style="height:50%"></div></div>
      <div class="board-shell"><div id="ground"></div></div>
    </div>
    <div class="nav">
      <button id="navStart" type="button" title="Start (Up)">|◀</button>
      <button id="navBack" type="button" title="Back (Left)">◀</button>
      <button id="navForward" type="button" title="Forward (Right)">▶</button>
      <button id="navEnd" type="button" title="End (Down)">▶|</button>
      <button id="flip" type="button" title="Flip board">⇅</button>
    </div>
    <div class="row">
      <div class="field" style="flex:1 1 100%"><label for="fenInput">FEN</label>
        <input id="fenInput" type="text" spellcheck="false" autocomplete="off" placeholder="paste a FEN" /></div>
      <button id="loadFen" type="button">Load FEN</button>
      <button id="reset" type="button">Reset</button>
    </div>
    <h2>PGN</h2>
    <textarea id="pgnInput" spellcheck="false" placeholder="paste PGN (with variations) and Load"></textarea>
    <div class="row">
      <button id="loadPgn" type="button">Load PGN</button>
      <button id="copyPgn" type="button">Copy PGN</button>
    </div>
    <div id="message">Loading model…</div>
  </section>
  <section class="panel" aria-label="Analysis">
    <div class="row">
      <button id="analyze" class="primary" type="button" disabled>Analyze</button>
      <button id="stop" type="button" disabled>Stop</button>
      <label class="small"><input type="checkbox" id="autoAnalyze" checked /> auto</label>
      <div class="field"><label for="multiPvInput">Lines</label>
        <input id="multiPvInput" type="number" min="1" max="10" step="1" value="3" /></div>
    </div>
    <div class="row">
      <label class="small"><input type="checkbox" id="useLc0" checked /> LC0</label>
      <div class="field"><label for="visitsInput">LC0 visits</label>
        <input id="visitsInput" type="number" min="1" max="100000" step="1" value="400" /></div>
      <label class="small"><input type="checkbox" id="useStockfish" /> Stockfish</label>
      <div class="field"><label for="sfDepthInput">SF depth</label>
        <input id="sfDepthInput" type="number" min="1" max="30" step="1" value="14" /></div>
      <label class="small"><input type="checkbox" id="useReckless" /> Reckless</label>
      <div class="field"><label for="recklessDepthInput">Reckless depth</label>
        <input id="recklessDepthInput" type="number" min="1" max="20" step="1" value="4" /></div>
      <div class="field"><label for="recklessVariantSelect">Reckless variant</label>
        <select id="recklessVariantSelect"></select></div>
    </div>
    <div id="recklessRuntimeInfo" class="small">Reckless: detecting runtime…</div>
    <h2>Engine lines</h2>
    <div id="engineLegend" class="legend"></div>
    <ol id="lines" class="lines"></ol>
    <h2>Moves</h2>
    <div id="movelist" class="movelist"></div>
    <dl class="status-grid">
      <dt>Backend</dt><dd id="backend">—</dd>
      <dt>Position</dt><dd id="posEval">—</dd>
      <dt>Side</dt><dd id="sideToMove">—</dd>
    </dl>
    <h2>Opening explorer</h2>
    <div class="row">
      <div class="field"><label for="importSite">Site</label>
        <select id="importSite"><option value="lichess">Lichess</option><option value="chesscom">Chess.com</option></select></div>
      <div class="field" style="flex:1 1 120px"><label for="importUser">Username</label>
        <input id="importUser" type="text" spellcheck="false" autocomplete="off" placeholder="your username" /></div>
      <div class="field"><label for="importMax">Max</label>
        <input id="importMax" type="number" min="1" max="300" step="1" value="40" /></div>
      <div class="field"><label for="importColor">Color</label>
        <select id="importColor"><option value="">both</option><option value="white">white</option><option value="black">black</option></select></div>
      <button id="fetchGames" type="button">Fetch games</button>
    </div>
    <textarea id="importGamesInput" spellcheck="false" placeholder="fetch by username above, or paste many games (PGN) here, then Import"></textarea>
    <div class="row">
      <button id="importGames" type="button">Import games</button>
      <button id="downloadPgn" type="button">Download PGN</button>
      <span id="importInfo" class="small"></span>
    </div>
    <table id="opening" class="opening"><thead><tr><th>Move</th><th class="num">Games</th><th>White / Draw / Black</th></tr></thead><tbody></tbody></table>
  </section>
</main>
<script type="module" src="/src/lc0/analysisBrowser.ts"></script>
</body>
</html>
