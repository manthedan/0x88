AWSTemplateFormatVersion: '2010-09-09'
Description: Tiny Leela CPU Spot AWS Batch stack for cache/reanalysis workers.

Parameters:
  ProjectName:
    Type: String
    Default: tiny-leela-cache
  BucketName:
    Type: String
    Description: S3 bucket name workers may read/write.
  ContainerImage:
    Type: String
    Description: ECR image URI for the cache worker.
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
  MaxVCpus:
    Type: Number
    Default: 512
  BidPercentage:
    Type: Number
    Default: 50
    Description: Spot max price as percent of on-demand. Existing explicit-service-role compute environments cannot update this in place; recreate/migrate to a Batch service-linked role to change it.

Resources:
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-batch-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: batch.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-batch-instance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: !Sub '${ProjectName}-s3-worker-access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:GetObject','s3:PutObject','s3:ListBucket','s3:AbortMultipartUpload']
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-batch-instance-profile'
      Roles: [!Ref BatchInstanceRole]

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-batch-job-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: !Sub '${ProjectName}-s3-job-access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:GetObject','s3:PutObject','s3:ListBucket','s3:AbortMultipartUpload']
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'

  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: !Sub '${ProjectName}-cpu-spot'
      Type: MANAGED
      State: ENABLED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: SPOT
        AllocationStrategy: SPOT_CAPACITY_OPTIMIZED
        MinvCpus: 0
        DesiredvCpus: 0
        MaxvCpus: !Ref MaxVCpus
        BidPercentage: !Ref BidPercentage
        InstanceTypes: ['optimal']
        Subnets: !Ref SubnetIds
        SecurityGroupIds: !Ref SecurityGroupIds
        InstanceRole: !GetAtt BatchInstanceProfile.Arn

  JobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub '${ProjectName}-queue'
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment

  JobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Sub '${ProjectName}-squareformer-cache'
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Vcpus: 2
        Memory: 4096
        JobRoleArn: !GetAtt BatchJobRole.Arn
        Environment:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
        LogConfiguration:
          LogDriver: awslogs

Outputs:
  JobQueueName:
    Value: !Ref JobQueue
  JobDefinitionName:
    Value: !Ref JobDefinition
  ComputeEnvironmentName:
    Value: !Ref ComputeEnvironment
