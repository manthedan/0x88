<!doctype html>
<meta charset="utf-8" />
<title>Tiny Leela TVMJS/WebGPU smoke</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; }
  pre { background: #111; color: #eee; padding: 1rem; white-space: pre-wrap; }
</style>
<h1>Tiny Leela TVMJS/WebGPU smoke</h1>
<p>Research-only: loads the staged whole-model squareformer TVMJS/WebGPU wasm, invokes it on synthetic inputs, and compares all outputs numerically against ORT running the same fixed-batch ONNX. Not a chess-level parity or perf protocol.</p>
<button id="run">Run smoke</button>
<pre id="log"></pre>
<script type="module">
import * as ortRuntime from '/src/nn/ortRuntime.ts';

const BASE = '/runtimes/tiny-tvmjs-webgpu/bt4-anneal-muon-best/v0/';
const BATCH = 16;
const TOKENS_SHAPE = [BATCH, 64, 24];
const ATTACK_SHAPE = [BATCH, 64, 28];
const OUTPUTS = [
  { name: 'policy', shape: [BATCH, 20480] },
  { name: 'wdl', shape: [BATCH, 3] },
  { name: 'q', shape: [BATCH] },
  { name: 'hidden', shape: [BATCH, 64, 128] },
];
const logEl = document.getElementById('log');
function log(...args) {
  logEl.textContent += `${args.map((x) => typeof x === 'string' ? x : JSON.stringify(x)).join(' ')}\n`;
}
function elementCount(shape) { return shape.reduce((a, b) => a * b, 1); }
// Deterministic synthetic inputs. Token features stay at small nonnegative
// values so every clamped embedding lookup is in range; attack summary gets
// small deterministic floats.
function syntheticInputs(seed = 7) {
  let state = seed >>> 0;
  const next = () => { state = (state * 1664525 + 1013904223) >>> 0; return state; };
  const tokens = new Int32Array(elementCount(TOKENS_SHAPE));
  for (let i = 0; i < tokens.length; i++) tokens[i] = next() % 8;
  const attack = new Float32Array(elementCount(ATTACK_SHAPE));
  for (let i = 0; i < attack.length; i++) attack[i] = ((next() % 1000) / 1000 - 0.5) * 0.5;
  return { tokens, attack };
}
async function loadTvmjsBundle() {
  if (globalThis.tvmjs) return;
  await new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = `${BASE}tvmjs.bundle.js`;
    script.onload = resolve;
    script.onerror = () => reject(new Error('tvmjs bundle load failed'));
    document.head.appendChild(script);
  });
  if (!globalThis.tvmjs) throw new Error('tvmjs global missing');
}
async function runTvm(inputs) {
  await loadTvmjsBundle();
  if (!navigator.gpu) throw new Error('navigator.gpu missing');
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error('WebGPU adapter unavailable');
  // Fused squareformer kernels (multi-input concats) can exceed the default
  // limit of 8 storage buffers per stage; request what the adapter offers.
  const requiredLimits = {};
  for (const key of ['maxStorageBuffersPerShaderStage', 'maxStorageBufferBindingSize', 'maxBufferSize', 'maxComputeWorkgroupStorageSize', 'maxComputeInvocationsPerWorkgroup']) {
    if (adapter.limits[key] !== undefined) requiredLimits[key] = adapter.limits[key];
  }
  const device = await adapter.requestDevice({ requiredLimits });
  window.tinyTvmjsGpuErrors = [];
  device.addEventListener('uncapturederror', (event) => {
    const message = event.error?.message ?? String(event.error);
    window.tinyTvmjsGpuErrors.push(message);
    log('webgpu uncaptured', message.slice(0, 400));
  });
  const wasmBytes = await (await fetch(`${BASE}model.b16.tvmjs.wasm`)).arrayBuffer();
  const tvm = await tvmjs.instantiate(wasmBytes, tvmjs.createPolyfillWASI(), () => {});
  tvm.initWebGPU(device);
  tvm.beginScope();
  try {
    const sys = tvm.systemLib();
    const t0 = performance.now();
    await tvm.asyncLoadWebGPUPipelines(sys);
    const pipelineMs = performance.now() - t0;
    const vm = tvm.createVirtualMachine(tvm.webgpu());
    const vmMod = vm.getInternalModule();
    const setInput = vmMod.getFunction('set_input');
    const invokeStateful = vmMod.getFunction('invoke_stateful');
    const getOutput = vmMod.getFunction('get_output');
    const tokensTensor = tvm.empty(TOKENS_SHAPE, 'int32', tvm.webgpu());
    tokensTensor.copyFromRawBytes(new Uint8Array(inputs.tokens.buffer));
    const attackTensor = tvm.empty(ATTACK_SHAPE, 'float32', tvm.webgpu());
    attackTensor.copyFromRawBytes(new Uint8Array(inputs.attack.buffer));
    setInput('main', tokensTensor, attackTensor);
    const i0 = performance.now();
    invokeStateful('main');
    const out = {};
    for (let i = 0; i < OUTPUTS.length; i++) {
      const tensor = getOutput('main', tvm.scalar(i, 'int32'));
      const cpu = tvm.empty(tensor.shape, tensor.dtype, tvm.cpu());
      cpu.copyFrom(tensor);
      await tensor.device.sync();
      out[OUTPUTS[i].name] = { shape: tensor.shape, dtype: tensor.dtype, data: new Float32Array(cpu.toRawBytes().buffer.slice(0)) };
    }
    const invokeAndReadMs = performance.now() - i0;
    return { outputs: out, pipelineMs, invokeAndReadMs };
  } finally {
    tvm.endScope();
  }
}
async function runOrt(inputs, ep) {
  ortRuntime.setRequestedOrtExecutionProviderForCurrentThread(ep);
  try {
    const session = await ortRuntime.createOrtSession(`${BASE}model.b16.onnx`);
    const tokens64 = new BigInt64Array(inputs.tokens.length);
    for (let i = 0; i < inputs.tokens.length; i++) tokens64[i] = BigInt(inputs.tokens[i]);
    const t0 = performance.now();
    const results = await session.run({
      tokens: new ortRuntime.Tensor('int64', tokens64, TOKENS_SHAPE),
      attack_summary: new ortRuntime.Tensor('float32', inputs.attack, ATTACK_SHAPE),
    });
    const runMs = performance.now() - t0;
    const out = {};
    for (const spec of OUTPUTS) {
      const tensor = results[spec.name];
      out[spec.name] = { shape: tensor.dims, dtype: tensor.type, data: Float32Array.from(tensor.data) };
    }
    await ortRuntime.releaseOrtSession(session);
    return { outputs: out, runMs };
  } finally {
    ortRuntime.setRequestedOrtExecutionProviderForCurrentThread(null);
  }
}
function compareOutputs(tvmOut, ortOut) {
  const rows = {};
  for (const spec of OUTPUTS) {
    const a = tvmOut[spec.name].data;
    const b = ortOut[spec.name].data;
    let maxAbs = 0;
    let finite = true;
    for (let i = 0; i < Math.min(a.length, b.length); i++) {
      if (!Number.isFinite(a[i])) { finite = false; break; }
      maxAbs = Math.max(maxAbs, Math.abs(a[i] - b[i]));
    }
    rows[spec.name] = { length: a.length, expectedLength: elementCount(spec.shape), maxAbsDiff: maxAbs, allFinite: finite };
  }
  return rows;
}
async function run() {
  logEl.textContent = '';
  const inputs = syntheticInputs();
  log('running TVMJS/WebGPU…');
  const tvm = await runTvm(inputs);
  log('tvm done', { pipelineMs: tvm.pipelineMs, invokeAndReadMs: tvm.invokeAndReadMs });
  log('running ORT wasm…');
  const ortWasm = await runOrt(inputs, 'wasm');
  log('ort wasm done', { runMs: ortWasm.runMs });
  const vsWasm = compareOutputs(tvm.outputs, ortWasm.outputs);
  let ortWebgpu;
  let vsWebgpu;
  try {
    log('running ORT webgpu…');
    ortWebgpu = await runOrt(inputs, 'webgpu');
    vsWebgpu = compareOutputs(tvm.outputs, ortWebgpu.outputs);
  } catch (err) {
    log('ort webgpu skipped:', err?.message ?? String(err));
  }
  const summary = {
    schema: 'lc0_browser.tiny_tvmjs_webgpu_smoke.v1',
    batch: BATCH,
    timing: { tvmPipelineMs: tvm.pipelineMs, tvmInvokeAndReadMs: tvm.invokeAndReadMs, ortWasmRunMs: ortWasm.runMs, ortWebgpuRunMs: ortWebgpu?.runMs },
    tvmVsOrtWasm: vsWasm,
    ...(vsWebgpu ? { tvmVsOrtWebgpu: vsWebgpu } : {}),
  };
  log('TINY_RESULT', summary);
  window.tinyTvmjsLastResult = summary;
  log('SMOKE_OK');
}
document.getElementById('run').addEventListener('click', () => run().catch((err) => {
  console.error(err);
  window.tinyTvmjsLastError = err?.stack ?? String(err);
  log('SMOKE_ERROR', window.tinyTvmjsLastError);
}));
if (new URLSearchParams(location.search).get('autorun') === '1') setTimeout(() => document.getElementById('run').click(), 0);
</script>
