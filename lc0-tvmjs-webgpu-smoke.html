          ortMs,
          tvmTop: tvmResult.children.slice(0, 5),
          ortTop: ortResult.children.slice(0, 5),

    const stockfish = await scoreSearchRowsWithStockfish(rows);

      visits,
      repeats,
      fixtureCount: fens.length,
      searchRows: rows.length,
      moveMatches: rows.filter((row) => row.moveMatches).length,
      tvmTiming: timingStats(rows.map((row) => row.tvmMs)),
      ortTiming: timingStats(rows.map((row) => row.ortMs)),
      tvmEvalTiming: timingStatsByKey(tvmProvider.evaluationTimings),
      tvmEvalTimingRows: tvmProvider.evaluationTimings.length,
      tvmEvalPositionTiming: timingStatsByKey(tvmProvider.positionTimings, TVM_POSITION_TIMING_KEYS),
      tvmEvalPositionTimingRows: tvmProvider.positionTimings.length,
      ...(stockfish ? { stockfish } : {}),
      rows,

}
async function runOrtComparisons(batch, fixtureRows, tvmRows) {
  const mode = document.getElementById('ortCompare').value;
  if (mode === 'none' || !fixtureRows.length) return undefined;
  const ep = document.getElementById('ortEp').value;
  setRequestedOrtExecutionProviderForCurrentThread(ep);
  const comparisons = {};
  const wanted = mode === 'both' ? ['f16', 'f32'] : [mode];
  try {
    for (const dtype of wanted) {
      if (dtype === 'f32' && batch !== 1) {
        comparisons.f32 = { skipped: true, reason: 'Only batch1 f32 ONNX is currently staged.' };
        continue;
      }
      const modelBatch = dtype === 'f32' ? 1 : batch;
      const modelPath = `/models/lc0/t1-256x10-distilled-swa-2432500.batch${modelBatch}.${dtype}.onnx`;
      const inputs = dtype === 'f32' ? fixtureRows.slice(0, 1).map((row) => row.fen) : fixtureRows.map((row) => row.fen);
      const compareRows = dtype === 'f32' ? tvmRows.slice(0, 1) : tvmRows;
      log('ort compare start', { dtype, ep, modelPath, inputs: inputs.length });
      const evaluator = await Lc0OnnxEvaluator.create(modelPath);
      const started = performance.now();
      const evals = await evaluator.evaluateBatch(inputs);
      const evalMs = performance.now() - started;
      await evaluator.dispose();
      comparisons[dtype] = { ep, modelPath, evalMs, ...compareTvmToEvaluations(compareRows, evals) };
      log('ort compare done', dtype, { evalMs, bestMoveMatches: comparisons[dtype].bestMoveMatches, comparable: comparisons[dtype].comparable });
    }
  } finally {
    setRequestedOrtExecutionProviderForCurrentThread(null);
  }
  return comparisons;
}
async function outputRawBytes(tvm, out) {
  const elementCount = out.shape.reduce((a, b) => a * b, 1);
  const rawBytes = elementCount * (out.dtype === 'float16' ? 2 : out.dtype === 'float32' ? 4 : 1);
  if (rawBytes % 4 !== 0) return null;
  const cpu = tvm.empty(out.shape, out.dtype, tvm.cpu());
  cpu.copyFrom(out);
  await out.device.sync();
  return cpu.toRawBytes();
}

async function run() {

  const startupTimings = {};
  const timed = async (name, fn) => {
    const started = performance.now();
    try { return await fn(); }
    finally { startupTimings[name] = performance.now() - started; }
  };
  const timedSync = (name, fn) => {
    const started = performance.now();
    try { return fn(); }
    finally { startupTimings[name] = performance.now() - started; }
  };
  const base = checkedStagedRuntimeUrl(manifestUrl, location.href, 'manifest');
  log('manifest', base.toString());
  const manifestResponse = await timed('manifestFetchMs', () => fetch(base));
  if (!manifestResponse.ok) throw new Error(`Manifest fetch failed: ${manifestResponse.status}`);
  const manifest = await timed('manifestJsonMs', () => manifestResponse.json());
  const model = manifest.models.find((item) => item.batch === batch);

  await timed('tvmjsBundleLoadMs', () => loadTvmjsBundle(tvmjsBundle, base));
  if (!navigator.gpu) throw new Error('navigator.gpu missing');

  log('tvmjs bundle', tvmjsBundle);

  }

    log('webgpu uncaptured', event.error?.message || String(event.error));
  });

  log('wasm fetched+verified', wasmBytes.byteLength);
  const tvm = await timed('tvmjsInstantiateMs', () => tvmjs.instantiate(wasmBytes, tvmjs.createPolyfillWASI(), (message) => log('tvmjs', message)));

  const tensorCacheBase = shouldFetchTensorCache ? tensorCacheUrl(manifest, base) : undefined;
  let tensorCacheMetadata;

    if (!tensorCacheBase) throw new Error('tensorCache=1 requested but manifest.tensorCache is missing');

        const fixedSuiteFens = (params.get('fixedSuiteFens') ?? '').split('|').map((fen) => fen.trim()).filter(Boolean);
        if (fixedSuiteFens.length) {

        } else {
