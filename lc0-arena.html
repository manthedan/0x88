<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LC0 arena</title>
<link rel="stylesheet" href="/chessground.base.css" />
<link rel="stylesheet" href="/chessground.brown.css" />
<link rel="stylesheet" href="/chessground.cburnett.css" />
<style>
:root{--bg:#f3eee4;--panel:#fbf8f0;--ink:#1f1c17;--muted:#6e665c;--rule:#d8cfbe;--accent:#5a6e2a;--soft:#e8efd3;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}
header{padding:12px 20px;border-bottom:1px solid var(--rule);background:var(--panel);display:flex;align-items:baseline;gap:16px}
header h1{margin:0;font-size:19px}header nav a{color:var(--muted);text-decoration:none;font-size:13px;margin-right:12px}header nav a.active{color:var(--accent);font-weight:700}
main{display:grid;grid-template-columns:minmax(300px,460px) minmax(340px,1fr);gap:20px;align-items:start;padding:18px}
.panel{background:var(--panel);border:1px solid var(--rule);border-radius:8px;padding:12px}
.board-shell{width:100%;aspect-ratio:1}#ground{width:100%;height:100%;border-radius:6px;overflow:hidden;box-shadow:0 14px 38px -26px #000}
.side-label{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0;padding:7px 9px;border:1px solid var(--rule);border-radius:6px;background:white;font-size:13px}
.side-label .color{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}.side-label .engine{font-weight:700}.side-label .turn{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700}
.side-label.active{background:var(--soft);border-color:#cbd8a6}
.cg-wrap{width:100%!important;height:100%!important}
button{border:1px solid var(--rule);border-radius:6px;background:white;color:var(--ink);padding:8px 10px;font:inherit;font-size:13px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700}button:disabled{opacity:.55;cursor:not-allowed}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-top:10px}
.field{display:grid;gap:3px}.field label{font-size:11px;color:var(--muted)}
input[type=number]{width:70px;font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--rule);border-radius:6px;font-family:var(--mono)}
select{font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--rule);border-radius:6px;background:white}
.field.wide{flex:1 1 100%}.field.wide textarea{margin-top:0;min-height:86px}
.engines{display:grid;gap:4px;margin-top:8px}.engines label{font-size:13px;display:flex;gap:8px;align-items:center}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--rule)}th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
td.num,th.num{text-align:right;font-family:var(--mono)}
tr.leader td{background:var(--soft)}
h2{font-size:13px;margin:14px 0 0;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.log{font-family:var(--mono);font-size:12px;max-height:180px;overflow:auto;margin-top:8px}
.log div{padding:2px 0;border-top:1px solid var(--rule)}
#pairing{font-family:var(--mono);font-size:13px;margin-top:10px;font-weight:600}
#message{margin-top:10px;padding:8px;border:1px solid var(--rule);border-radius:6px;background:var(--soft);font-family:var(--mono);font-size:12px}
textarea{width:100%;min-height:80px;font-family:var(--mono);font-size:11px;border:1px solid var(--rule);border-radius:6px;padding:8px;margin-top:8px;resize:vertical}
.small{font-size:12px;color:var(--muted)}
@media(max-width:900px){main{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>LC0 arena</h1>
  <nav><a href="/lc0-policy-only.html">Single engine</a><a class="active" href="/lc0-arena.html">Arena</a><a href="/lc0-analysis.html">Analysis</a></nav>
</header>
<main>
  <section class="panel" aria-label="Board">
    <div id="blackSideLabel" class="side-label" aria-label="Black side"></div>
    <div class="board-shell"><div id="ground"></div></div>
    <div id="whiteSideLabel" class="side-label" aria-label="White side"></div>
    <div id="pairing">Select engines and start a tournament.</div>
    <div id="message">Loading model…</div>
  </section>
  <section class="panel" aria-label="Tournament">
    <h2>Engines</h2>
    <div class="engines" id="engines">
      <label><input type="checkbox" value="lc0-policy" /> LC0 policy (no search)</label>
      <label><input type="checkbox" value="lc0-s100" checked /> LC0 search · 100 visits</label>
      <label><input type="checkbox" value="lc0-s400" /> LC0 search · 400 visits</label>
      <label><input type="checkbox" value="sf-d4" checked /> Stockfish lite · depth 4</label>
      <label><input type="checkbox" value="sf-d8" /> Stockfish lite · depth 8</label>
    </div>
    <div class="row">
      <div class="field"><label for="formatSelect">Format</label>
        <select id="formatSelect"><option value="round-robin">Round robin</option><option value="gauntlet">Gauntlet</option></select></div>
      <div class="field"><label for="championSelect">Gauntlet champion</label>
        <select id="championSelect"></select></div>
      <div class="field"><label for="gamesInput">Games/opening</label>
        <input id="gamesInput" type="number" min="1" max="20" step="1" value="2" /></div>
      <div class="field"><label for="delayInput">Delay ms</label>
        <input id="delayInput" type="number" min="0" max="3000" step="50" value="250" /></div>
      <div class="field"><label for="budgetModeSelect">Budget</label>
        <select id="budgetModeSelect"><option value="fixed">Fixed visits/depth</option><option value="movetime">Equal movetime</option></select></div>
      <div class="field"><label for="movetimeInput">Movetime ms</label>
        <input id="movetimeInput" type="number" min="10" max="60000" step="50" value="500" /></div>
      <div class="field"><label for="cacheEntriesInput">NN cache entries</label>
        <input id="cacheEntriesInput" type="number" min="0" max="100000" step="128" value="2048" /></div>
    </div>
    <div id="cacheInfo" class="small">NN cache: loading…</div>
    <h2>Starting positions</h2>
    <div class="row">
      <div class="field"><label for="startingPositionSelect">Suite</label>
        <select id="startingPositionSelect"><option value="start">Start position</option><option value="built-in">Built-in opening suite</option><option value="custom">Custom positions / replays</option></select></div>
      <div class="field wide"><label for="openingText">Custom openings (one per line: FEN, UCI moves, PGN/SAN, or Name | ...)</label>
        <textarea id="openingText" spellcheck="false" placeholder="Ruy Lopez | e2e4 e7e5 g1f3 b8c6 f1b5&#10;Italian Game | 1. e4 e5 2. Nf3 Nc6 3. Bc4&#10;Sicilian FEN | rnbqkbnr/pp1ppppp/8/2p5/3PP3/8/PPP2PPP/RNBQKBNR b KQkq d3 0 2"></textarea></div>
    </div>
    <div id="openingInfo" class="small">Start position only.</div>
    <div class="row">
      <button id="start" class="primary" type="button" disabled>Start tournament</button>
      <button id="stop" type="button" disabled>Stop</button>
    </div>
    <h2>Standings</h2>
    <table id="standings"><thead><tr><th>#</th><th>Engine</th><th class="num">Pts</th><th class="num">W</th><th class="num">L</th><th class="num">D</th><th class="num">G</th></tr></thead><tbody></tbody></table>
    <h2>Games</h2>
    <div class="log" id="log"></div>
    <div class="row"><button id="exportPgn" type="button">Export PGN</button></div>
    <textarea id="pgnOut" spellcheck="false" placeholder="game PGNs appear here after Export PGN"></textarea>
  </section>
</main>
<script type="module" src="/src/lc0/arenaBrowser.ts"></script>
</body>
</html>
