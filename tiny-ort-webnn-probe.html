<!doctype html>
<meta charset="utf-8" />
<title>Tiny Leela ORT WebNN probe</title>
<style>body { font-family: system-ui, sans-serif; margin: 2rem; } pre { background: #111; color: #eee; padding: 1rem; white-space: pre-wrap; }</style>
<h1>Tiny Leela ORT WebNN probe</h1>
<p>Runs the squareformer ONNX through ORT's webnn EP vs the webgpu EP on identical synthetic inputs. Needs Chrome with <code>--enable-features=WebMachineLearningNeuralNetwork</code>. Params: <code>?device=gpu|npu&batch=16&iters=20&model=...</code></p>
<button id="run">Run probe</button>
<pre id="log"></pre>
<script type="module">
import * as ort from 'onnxruntime-web';

const params = new URLSearchParams(location.search);
const MODEL = params.get('model') || '/models/bt4_anneal_muon_best.onnx';
const BATCH = Number(params.get('batch') || 16);
const DEVICE = params.get('device') || 'gpu';
const ITERS = Number(params.get('iters') || 20);
const WARMUP = Number(params.get('warmup') || 3);
const TOKEN_FEATURES = 24;
const ATTACK_FEATURES = 28;
const logEl = document.getElementById('log');
function log(...args) { logEl.textContent += args.map((x) => typeof x === 'string' ? x : JSON.stringify(x)).join(' ') + '\n'; }
ort.env.wasm.numThreads = 1;

function syntheticInputs() {
  // Deterministic small nonnegative token features (all embedding lookups in
  // range) + small attack floats; mirrors tiny-tvmjs-webgpu-smoke.html.
  let state = 7;
  const next = () => { state = (state * 1664525 + 1013904223) >>> 0; return state; };
  const i32 = params.get('tokensDtype') === 'int32';
  const tokens = i32 ? new Int32Array(BATCH * 64 * TOKEN_FEATURES) : new BigInt64Array(BATCH * 64 * TOKEN_FEATURES);
  for (let i = 0; i < tokens.length; i++) tokens[i] = i32 ? (next() % 8) : BigInt(next() % 8);
  const attack = new Float32Array(BATCH * 64 * ATTACK_FEATURES);
  for (let i = 0; i < attack.length; i++) attack[i] = ((next() % 1000) / 1000 - 0.5) * 0.5;
  return {
    tokens: new ort.Tensor(i32 ? 'int32' : 'int64', tokens, [BATCH, 64, TOKEN_FEATURES]),
    attack_summary: new ort.Tensor('float32', attack, [BATCH, 64, ATTACK_FEATURES]),
  };
}

async function timeSession(label, providers, feeds) {
  const t0 = performance.now();
  const session = await ort.InferenceSession.create(MODEL, { executionProviders: providers, graphOptimizationLevel: 'all' });
  const createMs = performance.now() - t0;
  for (let i = 0; i < WARMUP; i++) await session.run(feeds);
  const times = [];
  let results;
  for (let i = 0; i < ITERS; i++) {
    const s = performance.now();
    results = await session.run(feeds);
    times.push(performance.now() - s);
  }
  times.sort((a, b) => a - b);
  const out = {};
  for (const name of session.outputNames) out[name] = Float32Array.from(results[name].data, Number);
  log(label, { createMs: +createMs.toFixed(1), meanMs: +(times.reduce((a, b) => a + b, 0) / times.length).toFixed(3), minMs: +times[0].toFixed(3) });
  await session.release();
  return { createMs, meanMs: times.reduce((a, b) => a + b, 0) / times.length, out };
}

async function run() {
  logEl.textContent = '';
  const summary = { model: MODEL, batch: BATCH, device: DEVICE, iters: ITERS, ml: !!navigator.ml };
  try {
    const feeds = syntheticInputs();
    summary.webgpu = await timeSession('webgpu', ['webgpu'], feeds);
    summary.webnn = await timeSession(`webnn(${DEVICE})`, [{ name: 'webnn', deviceType: DEVICE }], feeds);
    summary.diffs = {};
    for (const name of Object.keys(summary.webgpu.out)) {
      const a = summary.webgpu.out[name];
      const b = summary.webnn.out[name];
      let maxd = 0;
      for (let i = 0; i < a.length; i++) { const d = Math.abs(a[i] - b[i]); if (d > maxd) maxd = d; }
      summary.diffs[name] = +maxd.toFixed(6);
    }
    log('diffs vs webgpu:', summary.diffs);
    summary.webgpu = { createMs: summary.webgpu.createMs, meanMs: summary.webgpu.meanMs };
    summary.webnn = { createMs: summary.webnn.createMs, meanMs: summary.webnn.meanMs };
    log('PROBE_OK');
  } catch (err) {
    summary.error = err?.message ?? String(err);
    log('PROBE_ERROR', summary.error);
  }
  window.tinyWebnnProbeResult = summary;
}
document.getElementById('run').addEventListener('click', run);
if (params.get('autorun') === '1') setTimeout(run, 0);
</script>
