[package]
name = "tiny_leela_core"
version = "0.1.0"
edition = "2021"
description = "Rust/WASM-ready core chess and feature infrastructure for Tiny Leela"

[lib]
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "tiny-leela-rust-bench"
path = "src/bin/bench.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
