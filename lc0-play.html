<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Play chess vs an engine — in your browser</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<meta name="description" content="Play chess against Leela Chess Zero, Stockfish, and four more engines running entirely in your browser. Five strength levels, takebacks, and PGN export." />
<link rel="stylesheet" href="/chessground.base.css" />
<link rel="stylesheet" href="/chessground.brown.css" />
<link rel="stylesheet" href="/chessground.cburnett.css" />
<style>
:root{--bg:#f3eee4;--panel:#fbf8f0;--ink:#1f1c17;--muted:#6e665c;--rule:#d8cfbe;--accent:#5a6e2a;--soft:#e8efd3;--warn:#a5461b;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}
header{padding:12px 20px;border-bottom:1px solid var(--rule);background:var(--panel);display:flex;align-items:baseline;gap:16px}
header h1{margin:0;font-size:19px}header nav a{color:var(--muted);text-decoration:none;font-size:13px;margin-right:12px}header nav a.active{color:var(--accent);font-weight:700}
main{display:grid;grid-template-columns:minmax(320px,620px) minmax(300px,400px);gap:20px;align-items:start;justify-content:center;padding:18px}
.panel{background:var(--panel);border:1px solid var(--rule);border-radius:8px;padding:14px}
.board-shell{width:100%;aspect-ratio:1}#ground{width:100%;height:100%;border-radius:6px;overflow:hidden;box-shadow:0 14px 38px -26px #000}
.cg-wrap{width:100%!important;height:100%!important}
#status{margin-top:12px;padding:10px 12px;border:1px solid var(--rule);border-radius:6px;background:var(--soft);font-size:14px}
#status.over{border-color:var(--accent);font-weight:700}
h2{font-size:13px;margin:16px 0 0;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.field{display:grid;gap:3px;margin-top:10px}.field label{font-size:11px;color:var(--muted)}
select,button,input{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;background:white;color:var(--ink)}
select,input{width:100%}
button{cursor:pointer}button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700}
button:disabled{opacity:.55;cursor:not-allowed}
button.danger{background:var(--warn);border-color:var(--warn);color:#fff;font-weight:700}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.row button{flex:1 1 auto}
.small{font-size:12px;color:var(--muted);line-height:1.5}
#levelCaption{margin-top:4px}
#engineCaution{margin-top:6px;padding:7px 9px;border:1px dashed var(--rule);border-radius:6px;background:#fff}
#engineNote{margin-top:8px;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;background:#fff;font-family:var(--mono);font-size:12px}
#engineNote.warn{color:var(--warn);border-color:var(--warn)}
#dlProgress{margin-top:8px}#dlProgress progress{width:100%;height:10px;accent-color:var(--accent)}#dlProgress .dl-label{margin-top:2px;font-family:var(--mono)}
#promoPicker{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}#promoPicker button{flex:1 1 auto}
#moveList{margin-top:8px;font-family:var(--mono);font-size:13px;line-height:1.8;max-height:300px;overflow:auto;padding:8px;border:1px solid var(--rule);border-radius:6px;background:#fff}
#moveList .num{color:var(--muted)}#moveList .placeholder{color:var(--muted)}
#pgnOut{font-family:var(--mono);font-size:12px;white-space:pre-wrap;overflow-wrap:anywhere;margin-top:8px}
#pgnOut:not(:empty){padding:8px;border:1px solid var(--rule);border-radius:6px;background:#fff}
.restart-banner{margin-top:10px;padding:10px 12px;border:1px solid var(--accent);border-radius:6px;background:var(--soft)}
@media(max-width:900px){main{grid-template-columns:1fr;padding:12px}}
[hidden]{display:none !important}
:where(button,select,input,textarea,a):focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <h1>Play</h1>
  <nav><a href="/">Home</a><a class="active" href="/lc0-play.html">Play</a><a href="/lc0-analysis.html">Analysis</a><a href="/lc0-arena.html">Arena</a></nav>
</header>
<main>
  <section class="panel" aria-label="Board">
    <div class="board-shell"><div id="ground"></div></div>
    <div id="status" aria-live="polite">Loading…</div>
    <div id="restartBanner" class="restart-banner" hidden>
      <span id="restartMessage" class="small"></span>
      <div class="row" style="margin-top:6px">
        <button id="confirmRestart" class="primary" type="button">Start new game</button>
        <button id="dismissRestart" type="button">Keep current game</button>
      </div>
    </div>
    <div id="promoPicker" hidden></div>
  </section>
  <section class="panel" aria-label="Game controls">
    <h2>Opponent</h2>
    <div class="field"><label for="engineSelect">Engine</label>
      <select id="engineSelect"></select></div>
    <div class="field"><label for="levelSelect">Strength</label>
      <select id="levelSelect"></select></div>
    <div id="maia3Controls" hidden>
      <div class="field"><label for="maia3Elo">Maia3 rating <span id="maia3EloValue">1500</span></label>
        <input id="maia3Elo" type="range" min="600" max="2600" step="100" value="1500" /></div>
      <div class="field"><label for="maia3Style">Maia3 move style</label>
        <select id="maia3Style">
          <option value="sample">Human sampling</option>
          <option value="argmax">Deterministic top move</option>
        </select></div>
      <div class="field" id="maia3TemperatureField"><label for="maia3Temperature">Temperature</label>
        <input id="maia3Temperature" type="number" min="0.01" max="5" step="0.05" value="1" /></div>
      <div class="field" id="maia3TopPField"><label for="maia3TopP">Top-p</label>
        <input id="maia3TopP" type="number" min="0.01" max="1" step="0.05" value="1" /></div>
    </div>
    <div id="levelCaption" class="small"></div>
    <div id="engineCaution" class="small" hidden></div>
    <div id="engineNote" hidden></div>
    <div id="dlProgress" hidden><progress></progress><div class="dl-label small"></div></div>
    <h2>Game</h2>
    <div class="field"><label for="colorSelect">You play</label>
      <select id="colorSelect">
        <option value="white">White</option>
        <option value="black">Black</option>
        <option value="random">Random</option>
      </select></div>
    <div class="row">
      <button id="newGame" class="primary" type="button">New game</button>
      <button id="takeback" type="button" disabled>Takeback</button>
      <button id="resign" type="button" disabled>Resign</button>
      <button id="flip" type="button" title="Flip board">⇅ Flip</button>
    </div>
    <h2>Moves</h2>
    <div id="moveList"></div>
    <div class="row">
      <button id="exportPgn" type="button">Show PGN</button>
      <button id="copyPgn" type="button">Copy PGN</button>
    </div>
    <div id="pgnOut"></div>
    <p class="small">Engines run entirely in your browser — nothing is sent to a server. The first move against a new engine downloads it (a few MB for CPU engines, up to a few hundred MB for the big Lc0 nets).</p>
  </section>
</main>
<script type="module" src="/src/lc0/playBrowser.ts"></script>
</body>
</html>
