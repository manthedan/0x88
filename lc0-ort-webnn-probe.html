<!doctype html>
<meta charset="utf-8" />
<title>LC0 ORT WebNN EP probe</title>
<style>body { font-family: system-ui, sans-serif; margin: 2rem; } pre { background: #111; color: #eee; padding: 1rem; white-space: pre-wrap; }</style>
<h1>LC0 ORT WebNN EP probe</h1>
<p>Research-only: runs the same f16 LC0 model through ORT's webnn EP (deviceType from <code>?device=gpu|npu|cpu</code>) and the webgpu EP, compares outputs and eval latency. Requires Chrome launched with <code>--enable-features=WebMachineLearningNeuralNetwork</code>.</p>
<button id="run">Run probe</button>
<pre id="log"></pre>
<script type="module">
import * as ort from 'onnxruntime-web';

const params = new URLSearchParams(location.search);
const MODEL = params.get('model') || '/models/lc0/t1-256x10-distilled-swa-2432500.batch8.f16.onnx';
const BATCH = Number(params.get('batch') || 8);
const DEVICE = params.get('device') || 'gpu';
const ITERS = Number(params.get('iters') || 20);
const WARMUP = Number(params.get('warmup') || 3);
const logEl = document.getElementById('log');
function log(...args) { logEl.textContent += args.map((x) => typeof x === 'string' ? x : JSON.stringify(x)).join(' ') + '\n'; }

ort.env.wasm.numThreads = 1;

const DTYPE = params.get('dtype') || 'float16';
function randomInput() {
  // Sparse binary planes approximate LC0 112-plane occupancy; identical input
  // feeds both sessions so the comparison is apples-to-apples.
  const n = BATCH * 112 * 8 * 8;
  let seed = 1234567;
  const bits = [];
  for (let i = 0; i < n; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    bits.push((seed / 0x7fffffff) < 0.12 ? 1 : 0);
  }
  if (DTYPE === 'float32') return new ort.Tensor('float32', Float32Array.from(bits), [BATCH, 112, 8, 8]);
  const data = new Uint16Array(n);
  for (let i = 0; i < n; i++) data[i] = bits[i] ? 0x3c00 : 0;
  return new ort.Tensor('float16', data, [BATCH, 112, 8, 8]);
}

async function timeSession(label, providers) {
  const t0 = performance.now();
  const session = await ort.InferenceSession.create(MODEL, { executionProviders: providers, graphOptimizationLevel: 'all' });
  const createMs = performance.now() - t0;
  const input = randomInput();
  const feeds = { [session.inputNames[0]]: input };
  for (let i = 0; i < WARMUP; i++) await session.run(feeds);
  const times = [];
  let results;
  for (let i = 0; i < ITERS; i++) {
    const s = performance.now();
    results = await session.run(feeds);
    times.push(performance.now() - s);
  }
  times.sort((a, b) => a - b);
  const mean = times.reduce((a, b) => a + b, 0) / times.length;
  const out = {};
  for (const name of session.outputNames) {
    const t = results[name];
    out[name] = t.data instanceof Float32Array ? Float32Array.from(t.data) : Float32Array.from(t.data, Number);
  }
  log(label, { createMs: +createMs.toFixed(1), meanMs: +mean.toFixed(2), medianMs: +times[Math.floor(times.length / 2)].toFixed(2), minMs: +times[0].toFixed(2) });
  await session.release();
  return { createMs, meanMs: mean, out };
}

async function run() {
  logEl.textContent = '';
  const summary = { model: MODEL, batch: BATCH, device: DEVICE, iters: ITERS, ml: !!navigator.ml };
  try {
    summary.webgpu = await timeSession('webgpu', ['webgpu']);
    summary.webnn = await timeSession(`webnn(${DEVICE})`, [{ name: 'webnn', deviceType: DEVICE }]);
    summary.diffs = {};
    for (const name of Object.keys(summary.webgpu.out)) {
      const a = summary.webgpu.out[name];
      const b = summary.webnn.out[name];
      let maxd = 0;
      for (let i = 0; i < a.length; i++) { const d = Math.abs(a[i] - b[i]); if (d > maxd) maxd = d; }
      summary.diffs[name] = +maxd.toFixed(5);
    }
    log('diffs vs webgpu:', summary.diffs);
    summary.webgpu = { createMs: summary.webgpu.createMs, meanMs: summary.webgpu.meanMs };
    summary.webnn = { createMs: summary.webnn.createMs, meanMs: summary.webnn.meanMs };
    log('PROBE_OK');
  } catch (err) {
    summary.error = err?.message ?? String(err);
    log('PROBE_ERROR', summary.error);
  }
  window.lc0WebnnProbeResult = summary;
}
document.getElementById('run').addEventListener('click', run);
if (params.get('autorun') === '1') setTimeout(run, 0);
</script>
