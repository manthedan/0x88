<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiny Leela Eval Broker Prototype</title>
  <style>
    :root { color-scheme: light; --bg:#f5efe4; --panel:#fffaf2; --ink:#221d16; --muted:#73695c; --rule:#d8cbb8; --accent:#4f6b20; --warn:#8a4b00; }
    body { margin:0; padding:24px; background:var(--bg); color:var(--ink); font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    h1 { margin:0 0 6px; font-family:Georgia,serif; font-size:28px; }
    .muted { color:var(--muted); }
    .panel { max-width:1180px; margin:14px 0; padding:14px; border:1px solid var(--rule); border-radius:8px; background:var(--panel); }
    button { padding:8px 12px; border:1px solid var(--rule); border-radius:6px; background:#efe6d6; color:var(--ink); cursor:pointer; }
    button.primary { background:var(--accent); border-color:var(--accent); color:white; font-weight:700; }
    table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
    th,td { padding:6px 8px; border-bottom:1px solid var(--rule); text-align:left; }
    th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    code,pre { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    pre { max-height:560px; overflow:auto; padding:12px; background:#211d17; color:#f7eddb; border-radius:6px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(190px,1fr)); gap:10px; }
    .metric { padding:10px; border:1px solid var(--rule); border-radius:6px; background:#fffdf8; }
    .metric b { display:block; font-size:20px; }
  </style>
</head>
<body>
  <h1>Tiny Leela Eval Broker Prototype</h1>
  <div class="muted">Virtual self-play/search workers enqueue leaf evals into one shared broker: in-flight dedupe + LRU eval cache + pooled ORT-Web WebGPU batches.</div>
  <div class="panel">
    <button id="run" class="primary">Run prototype</button>
    <button id="copyJson">Copy JSON</button>
    <span id="status" class="muted">idle</span>
  </div>
  <div class="panel"><strong>Runtime diagnostics:</strong> <span id="diagnostics" class="muted">idle</span></div>
  <div class="panel grid" id="metrics"></div>
  <div class="panel"><table><thead><tr><th>batch size</th><th>count</th></tr></thead><tbody id="batchRows"></tbody></table></div>
  <div class="panel"><pre id="json">[]</pre></div>
  <script type="module" src="/src/browserEvalBrokerPrototype.ts"></script>
</body>
</html>
