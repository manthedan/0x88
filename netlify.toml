[build]
  command = "VITE_LC0_ARTIFACT_CHANNEL_URL=https://assets.0x88.app/channels/stable.json VITE_LC0_BROWSER_ASSET_BASE_URL=https://assets.0x88.app npm run build:netlify:r2"
  publish = "dist-client"

# Keep engine pages eligible for WebAssembly threads/SAB experiments and WebGPU
# runtime probes. Engine artifacts are loaded lazily after selector opt-in.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-origin"

# Root/product HTML should revalidate so app-shell changes and channel pointer
# changes are visible without waiting out a long browser TTL.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Mutable release-channel pointers are tiny and must revalidate in browsers.
# CDN-specific headers may keep the edge copy briefly and tolerate origin errors.
[[headers]]
  for = "/channels/*"
  [headers.values]
    Cache-Control = "public, max-age=0, no-cache"
    Netlify-CDN-Cache-Control = "public, max-age=60, stale-if-error=86400"
    CDN-Cache-Control = "public, max-age=60, stale-if-error=86400"
    Cloudflare-CDN-Cache-Control = "public, max-age=60, stale-if-error=86400"

# Long-lived immutable caching is reserved for content-addressed artifact paths.
# Stable engine/model URLs must not use immutable because their bytes may change
# while older browser HTTP-cache entries remain fresh.
[[headers]]
  for = "/artifacts/sha256/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000"
    CDN-Cache-Control = "public, max-age=31536000"
    Cloudflare-CDN-Cache-Control = "public, max-age=31536000"
