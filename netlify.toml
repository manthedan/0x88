[build]
  command = "npm run build:netlify"
  publish = "dist-client"

# Keep engine pages eligible for WebAssembly threads/SAB experiments and WebGPU
# runtime probes. Engine artifacts are loaded lazily after selector opt-in.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-origin"

# The deploy build writes .br/.gz sidecars for large generated engine artifacts.
# Netlify also performs automatic compression, but these explicit sidecars make
# the .data preload path deterministic for engine bundles that otherwise look
# like application/octet-stream.
[[redirects]]
  from = "/plentychess/plentychess-emscripten.js"
  to = "/plentychess/plentychess-emscripten.js.br"
  status = 200
  force = true

[[redirects]]
  from = "/plentychess/plentychess-emscripten.wasm"
  to = "/plentychess/plentychess-emscripten.wasm.br"
  status = 200
  force = true

[[redirects]]
  from = "/plentychess/plentychess-emscripten.data"
  to = "/plentychess/plentychess-emscripten.data.br"
  status = 200
  force = true

[[redirects]]
  from = "/berserk/berserk-emscripten.js"
  to = "/berserk/berserk-emscripten.js.br"
  status = 200
  force = true

[[redirects]]
  from = "/berserk/berserk-emscripten.wasm"
  to = "/berserk/berserk-emscripten.wasm.br"
  status = 200
  force = true

[[redirects]]
  from = "/berserk/berserk-emscripten.data"
  to = "/berserk/berserk-emscripten.data.br"
  status = 200
  force = true

[[headers]]
  for = "/plentychess/*.js.br"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/plentychess/*.wasm.br"
  [headers.values]
    Content-Type = "application/wasm"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/plentychess/*.data.br"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/berserk/*.js.br"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/berserk/*.wasm.br"
  [headers.values]
    Content-Type = "application/wasm"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/berserk/*.data.br"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Encoding = "br"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/plentychess/*.gz"
  [headers.values]
    Content-Encoding = "gzip"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/berserk/*.gz"
  [headers.values]
    Content-Encoding = "gzip"
    Vary = "Accept-Encoding"
    Cache-Control = "public, max-age=31536000, immutable"
